<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccff00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ccff00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- logo mark — centered horizontally as a group -->
  <!-- total width: icon(120) + gap(28) + POLLTAP text(~430) = ~578, start at (1200-578)/2 = 311 -->
  <rect x="311" y="215" width="120" height="120" rx="28" fill="#0f172a" stroke="#ccff00" stroke-width="3" stroke-opacity="0.5"/>
  <path d="M338 315V271h28a18 18 0 0 1 0 36h-14" fill="none" stroke="#ccff00" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="398" cy="276" r="9" fill="#ccff00"/>

  <!-- wordmark: POLL in white, TAP in volt, no space -->
  <text x="459" y="299" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-weight="900" font-size="96" letter-spacing="-3" fill="#ffffff">POLL</text>
  <text x="693" y="299" font-family="'Inter', ui-sans-serif, system-ui, sans-serif" font-weight="900" font-size="96" letter-spacing="-3" fill="#ccff00">TAP</text>
</svg>
